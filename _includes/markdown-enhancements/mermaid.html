{%- include snippets/get-sources.html -%}
{%- assign _sources = __return -%}
<script>
  window.Lazyload.js('{{ _sources.mermaid }}', function() {
    mermaid.initialize({
      startOnLoad: false,
      themeVariables: {
        fontSize: '13px'
      }
    });
    mermaid.run({
      nodes: document.querySelectorAll('.language-mermaid')
    });
  });
</script>
